<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
</head>

<body>
    <img src="/fb.png" alt="facebook logo" height="200">
    <header>
        <h3>Sign In</h3>
    </header>
    <main>
        <form action="/signin.html">
            <input type="text" placeholder="Enter your name">
            <br>
            <br>
            <input type="password" placeholder="Enter your password">
            <br>
            <br>
            <input type="submit" value="Sign In">
            <br>
            <br>
            Don't have an account? <a href="/signup.html" target="_self">Register here</a>
        </form>
    </main>
</body>

</html>
